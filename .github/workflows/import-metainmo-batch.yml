name: Import Metainmo Batch

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'How many pages to scan'
        required: true
        default: '80'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run importer
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
          UPDATE_EXISTING: "1"
          MAX_IMAGES: "60"
          BACKUP: "0"
        run: node pl/new-developments/scripts/scrape-metainmo-to-projects.js

      - name: Check generated files
        run: |
          echo "=== new-developments folder ==="
          ls -la pl/new-developments
          echo "=== projects.json preview ==="
          test -f pl/new-developments/projects.json && head -c 500 pl/new-developments/projects.json || echo "projects.json NOT FOUND"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pl/new-developments/projects.json
          git status
          git commit -m "Import Metainmo projects" || echo "No changes"
          git push

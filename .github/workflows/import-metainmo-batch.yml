name: Import Metainmo Batch PRO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Run importer
        env:
          MAX_PAGES: 999
          UPDATE_EXISTING: 1
          BACKUP: 0
        run: node pl/new-developments/scripts/scrape-metainmo-to-projects.js

      - name: Check projects.json
        run: |
          echo "==== CHECK FILE ===="
          ls -la pl/new-developments/
          echo "==== COUNT ===="
          node -e "const p=require('./pl/new-developments/projects.json'); console.log(p.length)"
          echo "==== PREVIEW ===="
          head -n 40 pl/new-developments/projects.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main

          git add pl/new-developments/projects.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update projects.json [auto]"
          git push origin main

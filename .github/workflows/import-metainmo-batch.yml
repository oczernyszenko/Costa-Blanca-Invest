name: Import Metainmo Batch

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'How many new public projects to import'
        required: true
        default: '50'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install cheerio

      - name: Import Metainmo projects
        run: IMPORT_LIMIT=${{ github.event.inputs.limit }} node pl/new-developments/scripts/scrape-metainmo-to-projects.js

      - name: Commit imported JSON
        run: |
               - name: Commit imported projects
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pl/new-developments/projects.json
          git commit -m "Import Metainmo public projects batch" || echo "No changes"
          git push

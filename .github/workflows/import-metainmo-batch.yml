name: Import Metainmo Batch PRO

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many projects to import"
        required: true
        default: "50"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 важно для rebase

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (if needed)
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Run importer
        env:
          IMPORT_LIMIT: ${{ github.event.inputs.limit }}
        run: node pl/new-developments/scripts/scrape-metainmo-to-projects.js

      # 🔥 ПРОВЕРКА: файл реально создан?
      - name: Check projects.json
        run: |
          echo "==== CHECK FILE ===="
          ls -la pl/new-developments/
          cat pl/new-developments/projects.json | head -n 20

      # 🔥 ГЛАВНЫЙ ФИКС (у тебя тут была проблема)
      - name: Commit & Push (PRO FIX)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # подтягиваем изменения
          git fetch origin

          # пробуем аккуратно
          git rebase origin/main || git rebase --abort

          # добавляем файл
          git add pl/new-developments/projects.json

          # если нет изменений — выходим
          git diff --cached --quiet && echo "No changes" && exit 0

          # коммит
          git commit -m "Update projects.json [auto]"

          # 🔥 форс пуш (иначе у тебя reject)
          git push origin HEAD:main --force

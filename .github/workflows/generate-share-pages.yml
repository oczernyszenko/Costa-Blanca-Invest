name: Generate Share Pages

on:
  push:
    paths:
      - 'pl/new-developments/projects.json'
      - 'scripts/generate-share-pages.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run generator
        run: node scripts/generate-share-pages.js

      - name: Commit share pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pl/new-developments/share/
          git commit -m "Auto-generate share pages" || echo "No changes"
          git push

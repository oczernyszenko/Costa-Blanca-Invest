<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oferta nieruchomości | Costa Blanca Invest</title>
  <meta name="description" content="Szczegóły oferty nieruchomości Costa Blanca Invest.">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <meta name="author" content="Olga Chernyshenko">
  <meta name="theme-color" content="#0f6f85">
  <meta name="format-detection" content="telephone=no">
  <link rel="canonical" id="canonicalLink" href="https://costa-blanca-invest.com/pl/new-developments/xml-catalog/">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="pl_PL">
  <meta property="og:site_name" content="Costa Blanca Invest">
  <meta property="og:title" content="Oferta nieruchomości | Costa Blanca Invest">
  <meta property="og:description" content="Szczegóły oferty nieruchomości Costa Blanca Invest.">
  <meta property="og:image" content="https://costa-blanca-invest.com/pl/new-developments/images/new-developments-costa-blanca.jpg">
  <meta property="og:url" content="https://costa-blanca-invest.com/pl/new-developments/xml-catalog/">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#183746;
      --primary-2:#234e63;
      --primary-soft:#9ec7d4;
      --gold:#d9b56d;
      --gold-dark:#b89245;
      --bg:#f6f3ee;
      --text:#172532;
      --text-soft:#62707c;
      --muted:#8e9aa4;
      --surface:rgba(255,255,255,.88);
      --shadow-soft:0 14px 34px rgba(15,23,42,.06);
      --radius:28px;
      --container:1280px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top left,rgba(217,181,109,.12),transparent 24%),radial-gradient(circle at top right,rgba(158,199,212,.14),transparent 28%),linear-gradient(180deg,#fdfbf8 0%,var(--bg) 52%,#fff 100%);
      line-height:1.72;
      overflow-x:hidden;
    }
    img{display:block;max-width:100%;height:auto}
    a{color:inherit;text-decoration:none}
    h1,h2,h3{margin:0 0 14px;line-height:1.08}
    p{margin:0 0 14px;color:var(--text-soft)}
    ul{margin:0;padding-left:0;list-style:none;color:var(--text-soft)}
    ul li{position:relative;padding-left:28px;margin-bottom:8px}
    ul li::before{content:"✔";position:absolute;left:0;top:0;color:var(--gold);font-weight:900}
    .container{width:100%;max-width:var(--container);margin:0 auto;padding:0 20px}
    .page{padding:24px 0 80px}
    .top-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:nowrap;margin-bottom:20px}
    .lang-switcher{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0}
    .lang-btn{width:38px;height:38px;border-radius:50%;border:none;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(145deg,#e6c27a,#cfa75a);color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.08), inset 0 2px 4px rgba(255,255,255,.4);transition:all .2s ease}
    .lang-btn.active{background:#fff;color:var(--gold-dark);box-shadow:0 6px 16px rgba(0,0,0,.12)}
    .back-link{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin:0;padding:12px 18px;border-radius:999px;background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.34);box-shadow:0 8px 18px rgba(15,23,42,.04);color:var(--gold-dark);font-size:15px;font-weight:800}
    .hero-card,.section-card,.cta-box{position:relative;overflow:hidden;border-radius:var(--radius);background:var(--surface);border:1px solid rgba(255,255,255,.40);box-shadow:0 20px 50px rgba(15,23,42,.08),0 0 0 1px rgba(255,255,255,.14) inset}
    .hero-card{padding:20px}
    .section-card,.cta-box{margin-top:32px;padding:40px}
    .hero-media{position:relative;overflow:hidden;min-height:700px;border-radius:26px;background:#e7edf1;box-shadow:0 30px 90px rgba(15,23,42,.22);cursor:zoom-in}
    .hero-media::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,14,20,.06) 0%,rgba(8,14,20,.14) 34%,rgba(8,14,20,.62) 100%);z-index:1;pointer-events:none}
    .hero-media img{width:100%;height:100%;min-height:700px;object-fit:cover}
    .hero-badge{position:absolute;top:22px;right:22px;z-index:3;padding:12px 18px;border-radius:999px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.22);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
    .hero-overlay{position:absolute;left:24px;right:24px;bottom:24px;z-index:3;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
    .hero-copy{max-width:760px}
    .hero-kicker{margin-bottom:10px;color:rgba(255,255,255,.82);font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16)}
    .hero-display{margin:0 0 14px;color:#fff;font-size:clamp(40px,5.6vw,78px);font-weight:900;letter-spacing:-.05em;line-height:.94;text-shadow:0 16px 34px rgba(0,0,0,.24);max-width:10ch}
    .hero-sub{max-width:620px;color:rgba(255,255,255,.9);font-size:15px}
    .hero-price-box{min-width:320px;max-width:390px;padding:20px 22px;border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.26) 0%,rgba(255,255,255,.12) 100%);border:1px solid rgba(255,255,255,.24);color:#fff;box-shadow:0 18px 40px rgba(0,0,0,.16);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);text-align:left}
    .hero-price-box small{display:block;margin-bottom:10px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.78;font-weight:800}
    .hero-price-main{display:block;color:#fff8d6;font-size:clamp(25px,3vw,36px);line-height:1.05;font-weight:900;letter-spacing:-.05em}
    .hero-price-note{display:block;margin-top:8px;font-size:13px;line-height:1.5;color:rgba(255,255,255,.96);font-weight:700}
    .gallery-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:18px}
    .gallery-item{position:relative;overflow:hidden;height:220px;border-radius:22px;background:#edf1f4;border:1px solid rgba(255,255,255,.34);box-shadow:0 20px 44px rgba(15,23,42,.10);cursor:zoom-in}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
    .content{margin-top:34px}
    .hero-title,.subtitle,.price,.price-soft{text-align:center}
    .hero-title{max-width:980px;margin:0 auto 12px;color:var(--primary);font-size:clamp(38px,5.2vw,60px);letter-spacing:-.04em;text-wrap:balance}
    .subtitle{margin-bottom:10px;color:var(--text-soft);font-size:18px}
    .price{margin-bottom:10px;color:var(--gold);font-size:clamp(28px,4vw,38px);font-weight:900;letter-spacing:-.03em}
    .price-soft{color:var(--text-soft);font-size:17px;font-weight:700;opacity:.88}
    .kpi-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:0 0 24px}
    .kpi{padding:24px 18px 20px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.96) 0%,#fbf5e9 100%);border:1px solid rgba(217,181,109,.20);box-shadow:0 14px 30px rgba(0,0,0,.04);text-align:center}
    .kpi strong{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;margin:0 auto 10px;color:#fff;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff8d6 0%,#f5d27a 25%,#d9b56d 55%,#b89245 100%);font-size:14px;font-weight:900}
    .kpi .value{color:var(--primary);font-size:clamp(18px,2.4vw,24px);font-weight:900;letter-spacing:-.02em}
    .lead{font-size:16px;line-height:1.82;text-align:justify;text-justify:inter-word;hyphens:auto}
    .params-title{margin:34px 0 10px;color:var(--primary);font-size:24px;text-align:center}
    .params-accent{width:88px;height:3px;margin:0 auto 16px;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--primary-soft))}
    .param{padding:18px 22px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.97) 0%,rgba(247,251,253,.94) 100%);border:1px solid rgba(214,165,93,.16);box-shadow:0 12px 28px rgba(15,23,42,.05);font-size:17px;line-height:1.9;text-align:center}
    .param .label{color:var(--muted);font-size:13px;font-weight:600;margin-right:6px}
    .param .value{margin-right:14px;color:var(--primary);font-size:16px;font-weight:800}
    .why-grid,.audience-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:24px}
    .why-item,.audience-card{padding:22px 20px;border-radius:22px;border:1px solid rgba(217,181,109,.18);background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(250,246,238,.92));box-shadow:0 10px 24px rgba(15,23,42,.05)}
    .why-item strong,.audience-card strong{display:block;margin-bottom:8px;color:var(--primary);font-size:17px;line-height:1.3}
    .why-item p,.audience-card p{margin:0;line-height:1.65;font-size:14px}
    .section-card h2,.cta-box h2{position:relative;padding-bottom:12px;color:var(--primary);font-size:clamp(30px,4vw,42px);letter-spacing:-.03em}
    .section-card h2::after,.cta-box h2::after{content:"";position:absolute;left:0;bottom:0;width:70px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--gold),transparent)}
    .contact-box{text-align:center;background:linear-gradient(180deg,#fff 0%,#f8fbfd 100%)}
    .agent-card{display:grid;grid-template-columns:1fr 120px;gap:24px;align-items:center;max-width:980px;margin:0 auto 28px;padding:24px;border-radius:24px;background:rgba(255,255,255,.86);border:1px solid rgba(217,181,109,.16);box-shadow:var(--shadow-soft);text-align:left}
    .agent-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;justify-self:end;border:3px solid rgba(243,199,123,.26);box-shadow:0 16px 34px rgba(15,23,42,.14)}
    .agent-name{margin:0 0 4px;color:var(--primary);font-size:24px;font-weight:900;line-height:1.08}
    .agent-role{margin:0 0 6px;color:var(--gold-dark);font-size:15px;font-weight:800;letter-spacing:.02em}
    .agent-meta{margin:0;color:var(--text-soft);font-size:14px;line-height:1.7}
    .cta-actions,.share-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
    .cta-actions{margin:4px 0 18px}
    .btn,.share-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:54px;padding:0 24px;border-radius:999px;border:1px solid rgba(255,255,255,.34);box-shadow:0 14px 28px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.28);font-size:15px;font-weight:800;cursor:pointer;overflow:hidden;color:#ffffff;background:linear-gradient(135deg,#183746,#234e63)}
    .btn-main{background:linear-gradient(135deg,#d9b56d,#b89245)}
    .btn-light{background:linear-gradient(135deg,#25d366,#149e48)}
    .loading,.not-found{padding:40px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-soft);text-align:center;color:var(--text-soft)}
    .media-lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(5,10,16,.94);z-index:9999}
    .media-lightbox.open{display:flex}
    .media-lightbox-inner{position:relative;width:min(1100px,92vw);max-height:90vh;border-radius:24px;overflow:hidden;background:#0b141c;box-shadow:0 28px 70px rgba(0,0,0,.35)}
    .media-lightbox img{width:100%;max-height:90vh;object-fit:contain;background:#0b141c}
    .media-lightbox-close{position:absolute;top:14px;right:14px;z-index:2;width:42px;height:42px;border:none;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;font-size:24px;cursor:pointer}
    @media (max-width:1100px){.hero-media,.hero-media img{min-height:520px}.gallery-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.why-grid,.audience-grid{grid-template-columns:1fr}}
    @media (max-width:980px){.hero-media,.hero-media img{min-height:430px}.hero-overlay{left:18px;right:18px;bottom:18px}.gallery-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:768px){body{padding-bottom:24px}.container{padding:0 14px}.page{padding:18px 0 50px}.section-card,.cta-box{padding:24px}.top-controls{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px}.lang-switcher{justify-content:flex-end;width:auto;margin:0;gap:8px}.hero-media,.hero-media img{min-height:340px}.hero-overlay{flex-direction:column;align-items:flex-start;gap:12px;left:14px;right:14px;bottom:14px}.hero-copy{max-width:100%;width:100%}.hero-display{font-size:clamp(28px,7vw,40px);max-width:100%}.hero-sub{font-size:13px}.hero-price-box{min-width:0;width:100%;max-width:100%;padding:16px 16px 14px}.gallery-grid,.kpi-row{grid-template-columns:1fr}.cta-actions,.share-actions{flex-direction:column}.cta-actions .btn,.share-actions .share-btn{width:100%}.agent-card{grid-template-columns:1fr;text-align:center;gap:16px}.agent-avatar{margin:0 auto;justify-self:center;order:-1}.agent-meta{text-align:center}.back-link{width:100%;justify-content:center}}
    @media (max-width:560px){.container{padding:0 10px}.hero-card,.section-card,.cta-box{border-radius:18px}.hero-media,.hero-media img{min-height:280px}.hero-badge{top:12px;right:12px;min-height:36px;padding:0 11px;font-size:10px}.hero-overlay{left:12px;right:12px;bottom:12px;gap:12px}.hero-kicker{font-size:10px;letter-spacing:.18em;padding:9px 12px}.hero-display{font-size:clamp(26px,8vw,38px)}.gallery-grid{grid-template-columns:1fr;gap:10px}.hero-title{font-size:clamp(30px,9vw,40px)}.price{font-size:24px}.lead,p{font-size:15px}.param{font-size:14px;line-height:1.8}.section-card,.cta-box,.why-item,.audience-card{padding:20px}.btn,.share-btn{min-height:52px}.subtitle,.price-soft{font-size:14px}.lang-btn{width:28px;height:28px;font-size:9px}.back-link{font-size:13px;padding:10px 12px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <div class="top-controls">
        <a class="back-link" href="/pl/new-developments/">← Wróć do katalogu</a>
        <div class="lang-switcher" aria-label="Language switcher">
          <button class="lang-btn active" type="button" data-lang="pl">PL</button>
          <button class="lang-btn" type="button" data-lang="es">ES</button>
          <button class="lang-btn" type="button" data-lang="en">EN</button>
          <button class="lang-btn" type="button" data-lang="ru">RU</button>
        </div>
      </div>

      <div id="app" class="loading">Ładowanie oferty...</div>
    </div>
  </main>

  <div class="media-lightbox" id="mediaLightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="media-lightbox-inner">
      <button class="media-lightbox-close" type="button" id="mediaLightboxClose" aria-label="Zamknij">×</button>
      <div id="mediaLightboxContent"></div>
    </div>
  </div>

  <script>
    const PROJECTS_URL = '/pl/new-developments/projects.json';
    const SUPPORTED_LANGS = ['pl', 'es', 'en', 'ru'];
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const app = document.getElementById('app');
    const langButtons = Array.from(document.querySelectorAll('.lang-btn'));
    const mediaLightbox = document.getElementById('mediaLightbox');
    const mediaLightboxContent = document.getElementById('mediaLightboxContent');
    const mediaLightboxClose = document.getElementById('mediaLightboxClose');
    let currentLang = SUPPORTED_LANGS.includes(params.get('lang')) ? params.get('lang') : 'pl';
    let currentProperty = null;

    const fallbackImage = '/pl/new-developments/images/new-developments-costa-blanca.jpg';

    function getTranslation(item) {
      if (!item) return {};
      return item.translations?.[currentLang] || item.translations?.pl || item;
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
      }[ch]));
    }

    function absoluteUrl(path) {
      if (!path) return '';
      if (/^https?:\/\//i.test(path)) return path;
      return `https://costa-blanca-invest.com${path}`;
    }

    function updateMeta(item, t) {
      const title = t.page_title || t.title || item.title || 'Oferta nieruchomości | Costa Blanca Invest';
      const desc = t.meta_description || t.desc || item.desc || 'Szczegóły oferty nieruchomości Costa Blanca Invest.';
      const img = absoluteUrl(item.image || item.images?.[0] || fallbackImage);
      const url = `https://costa-blanca-invest.com/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(item.slug || slug || '')}`;

      document.documentElement.lang = currentLang;
      document.title = title;

      const set = (selector, attr, value) => {
        const el = document.querySelector(selector);
        if (el) el.setAttribute(attr, value);
      };

      set('meta[name="description"]', 'content', desc);
      set('#canonicalLink', 'href', url);
      set('meta[property="og:title"]', 'content', title);
      set('meta[property="og:description"]', 'content', desc);
      set('meta[property="og:image"]', 'content', img);
      set('meta[property="og:url"]', 'content', url);
    }

    function render(item) {
      currentProperty = item;
      const t = getTranslation(item);
      const images = item.images || item.gallery || [item.image || fallbackImage];
      const mainImage = item.image || images[0] || fallbackImage;
      const title = t.page_h1 || t.title || item.title || item.slug || 'Oferta nieruchomości';
      const chip = t.chip || item.chip || 'Nowa inwestycja';
      const meta = t.meta || item.meta || item.location || '';
      const price = t.price || item.price || '';
      const desc = t.desc || item.desc || '';
      const leads = t.lead || item.lead || [desc];
      const kpi = item.kpi || [price, item.area || item.surface_area || meta, item.bedrooms || item.beds || ''];
      const paramsObj = item.params || {
        'Lokalizacja': item.location || item.city || meta,
        'Cena': price,
        'Powierzchnia': item.area || item.surface_area || '',
        'Sypialnie': item.bedrooms || item.beds || '',
        'Łazienki': item.bathrooms || item.baths || '',
        'Taras': item.terrace || item.terrace_m2 || ''
      };

      updateMeta(item, t);

      app.className = '';
      app.innerHTML = `
        <section class="hero-card">
          <div class="hero-media" data-media-src="${esc(mainImage)}">
            <img src="${esc(mainImage)}" alt="${esc(item.alt || title)}" fetchpriority="high" decoding="async" onerror="this.src='${fallbackImage}'">
            <div class="hero-badge">${esc(chip)}</div>
            <div class="hero-overlay">
              <div class="hero-copy">
                <div class="hero-kicker">${esc(meta || 'Costa Blanca Invest')}</div>
                <div class="hero-display">${esc(title)}</div>
                <p class="hero-sub">${esc(desc)}</p>
              </div>
              <div class="hero-price-box">
                <small>Cena i parametry</small>
                <span class="hero-price-main">${esc(price)}</span>
                <span class="hero-price-note">${esc(meta)}</span>
              </div>
            </div>
          </div>

          <div class="gallery-grid">
            ${images.slice(0, 8).map((src, i) => `
              <div class="gallery-item" data-media-src="${esc(src)}">
                <img src="${esc(src)}" alt="${esc(title)} ${i + 1}" loading="lazy" decoding="async" onerror="this.src='${fallbackImage}'">
              </div>
            `).join('')}
          </div>
        </section>

        <div class="content">
          <h1 class="hero-title">${esc(title)}</h1>
          <div class="subtitle">${esc(meta)}</div>
          <div class="price">${esc(price)}</div>
          <div class="price-soft">${esc(desc)}</div>

          <div class="kpi-row">
            ${kpi.slice(0, 3).map((value, i) => `
              <div class="kpi"><strong>${i === 0 ? '€' : i + 1}</strong><div class="value">${esc(value || '—')}</div></div>
            `).join('')}
          </div>

          ${(Array.isArray(leads) ? leads : [leads]).filter(Boolean).map(text => `<p class="lead">${esc(text)}</p>`).join('')}

          <h2 class="params-title">Parametry oferty</h2>
          <div class="params-accent"></div>
          <div class="param">
            ${Object.entries(paramsObj).filter(([,v]) => v).map(([label, value]) => `
              <span class="label">${esc(label)}:</span><span class="value">${esc(value)}</span>
            `).join('')}
          </div>
        </div>

        <section class="section-card">
          <h2>Dlaczego ta oferta</h2>
          <div class="why-grid">
            <div class="why-item"><strong>Lokalizacja</strong><p>${esc(meta || 'Dobra lokalizacja inwestycyjna.')}</p></div>
            <div class="why-item"><strong>Potencjał</strong><p>${esc(desc || 'Oferta z potencjałem inwestycyjnym i użytkowym.')}</p></div>
            <div class="why-item"><strong>Kontakt</strong><p>Zapytaj o aktualną dostępność, dokumenty i warunki zakupu.</p></div>
          </div>
        </section>

        <section class="cta-box contact-box" id="contact">
          <h2>Zapytaj o tę ofertę</h2>
          <p>Skontaktuj się, aby otrzymać szczegóły, aktualną dostępność i podobne propozycje.</p>

          <div class="agent-card">
            <div>
              <div class="agent-name">Olga Chernyshenko</div>
              <div class="agent-role">Costa Blanca Invest</div>
              <p class="agent-meta">Pomagam wybrać nieruchomość pod życie, second home lub inwestycję.</p>
            </div>
            <img class="agent-avatar" src="https://costa-blanca-invest.com/avatar.png" alt="Olga Chernyshenko" loading="lazy" decoding="async">
          </div>

          <div class="cta-actions">
            <a class="btn btn-main" href="tel:+34604158859">📞 Zadzwoń</a>
            <a class="btn btn-light" href="https://wa.me/34604158859?text=${encodeURIComponent('Dzień dobry, interesuje mnie oferta: ' + title)}" target="_blank" rel="noopener noreferrer">💬 WhatsApp</a>
          </div>
        </section>
      `;

      document.querySelectorAll('[data-media-src]').forEach(item => {
        item.addEventListener('click', () => openMediaLightbox(item.dataset.mediaSrc));
      });

      langButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
    }

    function openMediaLightbox(src) {
      if (!mediaLightbox || !mediaLightboxContent || !src) return;
      mediaLightboxContent.innerHTML = `<img src="${esc(src)}" alt="Preview">`;
      mediaLightbox.classList.add('open');
      mediaLightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeMediaLightbox() {
      if (!mediaLightbox || !mediaLightboxContent) return;
      mediaLightbox.classList.remove('open');
      mediaLightbox.setAttribute('aria-hidden', 'true');
      mediaLightboxContent.innerHTML = '';
      document.body.style.overflow = '';
    }

    if (mediaLightboxClose) mediaLightboxClose.addEventListener('click', closeMediaLightbox);
    if (mediaLightbox) mediaLightbox.addEventListener('click', e => { if (e.target === mediaLightbox) closeMediaLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMediaLightbox(); });

    langButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        const url = new URL(window.location.href);
        if (currentLang === 'pl') url.searchParams.delete('lang');
        else url.searchParams.set('lang', currentLang);
        history.replaceState({}, '', `${url.pathname}${url.search}`);
        if (currentProperty) render(currentProperty);
      });
    });

    fetch(PROJECTS_URL, { cache: 'no-store' })
      .then(res => {
        if (!res.ok) throw new Error(`projects.json HTTP ${res.status}`);
        return res.json();
      })
      .then(projects => {
        const list = Array.isArray(projects) ? projects : [];
        const item = list.find(p => p.slug === slug);

        if (!slug || !item) {
          app.className = 'not-found';
          app.innerHTML = `
            <h1>Nie znaleziono oferty</h1>
            <p>Sprawdź link lub wróć do katalogu nowych inwestycji.</p>
            <p><a class="btn btn-main" href="/pl/new-developments/">← Wróć do katalogu</a></p>
          `;
          return;
        }

        render(item);
      })
      .catch(error => {
        console.error(error);
        app.className = 'not-found';
        app.innerHTML = `
          <h1>Błąd ładowania oferty</h1>
          <p>Sprawdź, czy istnieje plik <strong>/pl/new-developments/projects.json</strong>.</p>
          <p><a class="btn btn-main" href="/pl/new-developments/">← Wróć do katalogu</a></p>
        `;
      });
  </script>
</body>
</html>

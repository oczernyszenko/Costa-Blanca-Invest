        bathrooms: {pl:'Łazienki', en:'Bathrooms', es:'Baños', ru:'Ванные'},
        price: {pl:'Cena', en:'Price', es:'Precio', ru:'Цена'},
        type: {pl:'Typ', en:'Type', es:'Tipo', ru:'Тип'},
        terrace: {pl:'Taras', en:'Terrace', es:'Terraza', ru:'Терраса'}
      };

      let key = '';
      if (normalized.includes('lokal') || normalized.includes('location') || normalized.includes('ubic')) key = 'location';
      else if (normalized.includes('powierz') || normalized.includes('area') || normalized.includes('superficie') || normalized.includes('площад')) key = 'area';
      else if (normalized.includes('poko') || normalized.includes('rooms') || normalized.includes('habitaciones') || normalized.includes('комнат')) key = 'rooms';
      else if (normalized.includes('sypial') || normalized.includes('bed') || normalized.includes('dormitorio') || normalized.includes('спаль')) key = 'bedrooms';
      else if (normalized.includes('laz') || normalized.includes('bath') || normalized.includes('bano') || normalized.includes('baño') || normalized.includes('ванн')) key = 'bathrooms';
      else if (normalized.includes('cena') || normalized.includes('price') || normalized.includes('precio') || normalized.includes('цена')) key = 'price';

      else if (normalized.includes('taras') || normalized.includes('terrace') || normalized.includes('terraza') || normalized.includes('террас')) key = 'terrace';

      return key ? (dict[key][currentLang] || dict[key].pl) : label;

    function getParamKey(label){

        .replace(/ć/g,'c')
        .replace(/ń/g,'n')
        .replace(/ą/g,'a')
        .replace(/ę/g,'e')
        .replace(/ś/g,'s');

      if (normalized.includes('lokal') || normalized.includes('location') || normalized.includes('ubic') || normalized.includes('лока')) return 'location';
      if (normalized.includes('powierz') || normalized.includes('area') || normalized.includes('superficie') || normalized.includes('площад')) return 'area';
      if (normalized.includes('poko') || normalized.includes('rooms') || normalized.includes('habitaciones') || normalized.includes('комнат')) return 'rooms';
      if (normalized.includes('sypial') || normalized.includes('bed') || normalized.includes('dormitorio') || normalized.includes('спаль')) return 'bedrooms';
      if (normalized.includes('laz') || normalized.includes('bath') || normalized.includes('bano') || normalized.includes('baño') || normalized.includes('ванн')) return 'bathrooms';

    function getRelatedCards(currentSlug){
      return allProjects.filter(p=>p && p.slug && p.slug!==currentSlug && !p.isComingSoon).slice(0,3).map(project=>{
        const tr=project?.translations?.[currentLang]||project?.translations?.pl||{};
        const title=tr.title||project.title||project.slug;
        const meta=tr.meta||tr.subtitle||project.meta||safeLocation(project.location)||'';
        const image=getImage(project,0);
        const href=project.href||`/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(project.slug)}`;
        return `<a class="related-card" href="${esc(href)}"><img src="${esc(image)}" alt="${esc(title)}" loading="lazy" onerror="window.handleBrokenImage&&window.handleBrokenImage(this)"><div class="related-body"><span class="related-chip">Costa Blanca</span><div class="related-title">${esc(title)}</div><p class="related-meta">${esc(meta)}</p></div></a>`;
      }).join('');
    }

    function bindDynamicEvents(data){
      document.querySelectorAll('[data-media-src]').forEach(item=>item.addEventListener('click',()=>openMediaLightbox(item.dataset.mediaSrc)));
      document.getElementById('copyLinkBtn')?.addEventListener('click',async()=>{const url=`${SITE_ORIGIN}/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(data.slug)}${currentLang==='pl'?'':`&lang=${currentLang}`}`;try{await navigator.clipboard.writeText(url);}catch{window.prompt('Copy link:',url);}});
      document.getElementById('contact-form')?.addEventListener('submit',event=>{event.preventDefault();const formData=new FormData(event.currentTarget);const text=`Zapytanie z karty oferty:\n\n${data.title}\n\nImię: ${formData.get('name')||''}\nTelefon: ${formData.get('phone')||''}\nEmail: ${formData.get('email')||''}\n\n${formData.get('message')||''}`;window.open(`https://wa.me/34604158859?text=${encodeURIComponent(text)}`,'_blank','noopener');});
    }

    function renderSchema(data){
      const schema={'@context':'https://schema.org','@graph':[{'@type':'Organization',name:'Costa Blanca Invest',url:SITE_ORIGIN,email:'olga@a1invest4u.com',telephone:'+34604158859'},{'@type':'WebPage',name:data.title,url:`${SITE_ORIGIN}/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(data.slug)}`,description:data.desc,inLanguage:currentLang,primaryImageOfPage:{'@type':'ImageObject',url:data.image}},{'@type':'Product',name:data.title,description:data.desc,image:data.images,brand:{'@type':'Brand',name:'Costa Blanca Invest'},offers:{'@type':'Offer',priceCurrency:'EUR',price:moneyNumber(data.price)||undefined,availability:'https://schema.org/InStock',url:`${SITE_ORIGIN}/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(data.slug)}`}}]};
      document.getElementById('schemaJson').textContent=JSON.stringify(schema,null,2);
    }

    function renderNotFound(projects){const ui=UI[currentLang]||UI.pl;const known=projects.map(p=>p.slug).filter(Boolean).slice(0,10).join('<br>');templateApp.className='not-found';templateApp.innerHTML=`<h1>${esc(ui.not_found)}</h1><p>slug: ${esc(requestedSlug)}</p><p style="font-size:14px;line-height:1.7">${known}</p><p><a class="btn btn-main" href="/pl/new-developments/">${esc(ui.back_link)}</a></p>`;}
    async function fetchJsonFrom(url){const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error(`${url} HTTP ${response.status}`);const data=await response.json();if(!Array.isArray(data))throw new Error(`${url} is not array`);return data;}
    async function loadProjects(){const errors=[];for(const url of PROJECTS_URLS){try{const projects=await fetchJsonFrom(url);allProjects=projects;const item=findProject(projects,requestedSlug);if(!item){renderNotFound(projects);return;}renderProperty(item);console.info('projects.json loaded from',url);return;}catch(error){errors.push(error.message||String(error));}}console.warn('projects.json failed, using fallback',errors);allProjects=FALLBACK_PROJECTS;const fallback=findProject(FALLBACK_PROJECTS,requestedSlug)||FALLBACK_PROJECTS[0];renderProperty(fallback);}

    window.handleBrokenImage=function(img){if(img.dataset.fallbackApplied==='true')return;img.dataset.fallbackApplied='true';if(img.classList.contains('agent-avatar')){img.src=abs(AGENT_AVATAR);return;}img.src=abs(FALLBACK_IMAGE);};
    function openMediaLightbox(src){const box=document.getElementById('mediaLightbox');const content=document.getElementById('mediaLightboxContent');if(!box||!content||!src)return;content.innerHTML=`<img src="${esc(src)}" alt="Preview">`;box.classList.add('open');box.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
    function closeMediaLightbox(){const box=document.getElementById('mediaLightbox');const content=document.getElementById('mediaLightboxContent');if(!box||!content)return;box.classList.remove('open');box.setAttribute('aria-hidden','true');content.innerHTML='';document.body.style.overflow='';}
    document.getElementById('mediaLightboxClose')?.addEventListener('click',closeMediaLightbox);
    document.getElementById('mediaLightbox')?.addEventListener('click',event=>{if(event.target===event.currentTarget)closeMediaLightbox();});
    document.addEventListener('keydown',event=>{if(event.key==='Escape')closeMediaLightbox();});
    document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{currentLang=SUPPORTED_LANGS.includes(btn.dataset.lang)?btn.dataset.lang:'pl';document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang));const url=new URL(window.location.href);if(currentLang==='pl')url.searchParams.delete('lang');else url.searchParams.set('lang',currentLang);window.history.replaceState({},'',`${url.pathname}${url.search}${url.hash}`);if(currentProperty)renderProperty(currentProperty);}));

    function runSelfTests(){const tests=[['short slug matches long slug',()=>findProject(FALLBACK_PROJECTS,'alonis-villas-la-villajoyosa-vila-joiosa')?.slug==='alonis-villas-la-villajoyosa-vila-joiosa-230606'],['absolute CDN stays CDN',()=>abs('https://example.com/a.jpg')==='https://example.com/a.jpg'],['relative local becomes absolute',()=>abs('/pl/a.jpg')==='https://costa-blanca-invest.com/pl/a.jpg'],['image array creates absolute images',()=>getImages(FALLBACK_PROJECTS[0]).map(abs).every(src=>src.startsWith('https://'))],['param label translates EN',()=>{const old=currentLang;currentLang='en';const ok=translateParamLabel('Lokalizacja')==='Location';currentLang=old;return ok;}],['param icon works after translation',()=>getParamIcon('Location')==='📍'],['buildData has params',()=>buildData(FALLBACK_PROJECTS[0]).paramEntries.length>0],['render template does not contain removed KPI join bug',()=>!String(renderProperty).includes("join('')}</div>")]];const failed=tests.filter(([,fn])=>{try{return !fn();}catch{return true;}});if(failed.length)console.warn('Template tests failed:',failed.map(([name])=>name));else console.info('Template tests passed:',tests.length);}
    runSelfTests();
    loadProjects();
  </script>
</body>

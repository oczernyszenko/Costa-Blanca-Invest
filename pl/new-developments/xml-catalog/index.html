      setMeta('meta[property="og:image"]', "content", image);
      setMeta('meta[property="og:url"]', "content", url);
      setMeta('meta[name="twitter:title"]', "content", title);
      setMeta('meta[name="twitter:description"]', "content", price);
      setMeta('meta[name="twitter:image"]', "content", image);
      setMeta('meta[name="twitter:url"]', "content", url);
    }

    function bindShareButtons(item, d) {
      updateSharePreview(item, d);

      const text = getShareText(item, d);
      const wa = document.getElementById("heroWaShare");
      const copy = document.getElementById("heroCopyShare");

      if (wa) {
        wa.href = "https://wa.me/?text=" + encodeURIComponent(text);
      }

      if (copy) {
        copy.onclick = async () => {
          try {
            await navigator.clipboard.writeText(text);
            copy.textContent = "✔ Skopiowano";
            setTimeout(() => { copy.textContent = "🔗 Kopiuj link"; }, 1800);
          } catch (error) {
            window.prompt("Skopiuj tekst:", text);
          }
        };
      }
    }

    function bindDynamicEvents(item, d) {
      bindShareButtons(item, d);
      document.querySelectorAll('[data-media-src]').forEach(el => el.addEventListener('click', () => openMediaLightbox(el.dataset.mediaSrc)));
      const copyLinkBtn = document.getElementById('copyLinkBtn');
      if (copyLinkBtn) {
        copyLinkBtn.addEventListener('click', async () => {
          const shareUrl = `https://costa-blanca-invest.com/pl/new-developments/xml-catalog/?slug=${encodeURIComponent(item.slug)}${currentLang === 'pl' ? '' : `&lang=${currentLang}`}`;
          const shareText = `${shareUrl}\n\n🏡 ${d.title}\n💰 ${d.price}\n📍 ${d.meta}`;
          try { await navigator.clipboard.writeText(shareText); } catch (error) { window.prompt('Copy this text:', shareText); }
        });
      }
      const contactForm = document.getElementById('contact-form');
      if (contactForm) {
        contactForm.addEventListener('submit', event => {
          event.preventDefault();
          const formData = new FormData(contactForm);
          const text = `Zapytanie z karty oferty:\n\n${d.title}\n\nImię: ${formData.get('name') || ''}\nTelefon: ${formData.get('phone') || ''}\nEmail: ${formData.get('email') || ''}\n\n${formData.get('message') || ''}`;
          window.open(`https://wa.me/34604158859?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
        });
      }
    }

    window.handleBrokenImage = function(img) {
      if (img.dataset.fallbackApplied === 'true') return;
      img.dataset.fallbackApplied = 'true';
      img.src = FALLBACK_IMAGE;
    };

    function openMediaLightbox(src) {
      const mediaLightbox = document.getElementById('mediaLightbox');
      const mediaLightboxContent = document.getElementById('mediaLightboxContent');
      if (!mediaLightbox || !mediaLightboxContent || !src) return;
      mediaLightboxContent.innerHTML = `<img src="${esc(src)}" alt="Preview">`;
      mediaLightbox.classList.add('open');
      mediaLightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closeMediaLightbox() {
      const mediaLightbox = document.getElementById('mediaLightbox');
      const mediaLightboxContent = document.getElementById('mediaLightboxContent');
      if (!mediaLightbox || !mediaLightboxContent) return;
      mediaLightbox.classList.remove('open');
      mediaLightbox.setAttribute('aria-hidden', 'true');
      mediaLightboxContent.innerHTML = '';
      document.body.style.overflow = '';
    }
    document.getElementById('mediaLightboxClose')?.addEventListener('click', closeMediaLightbox);
    document.getElementById('mediaLightbox')?.addEventListener('click', event => { if (event.target === event.currentTarget) closeMediaLightbox(); });
    document.addEventListener('keydown', event => { if (event.key === 'Escape') closeMediaLightbox(); });

    function updateActiveLang() {
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = SUPPORTED_LANGS.includes(btn.dataset.lang) ? btn.dataset.lang : 'pl';
        const url = new URL(window.location.href);
        if (currentLang === 'pl') url.searchParams.delete('lang');
        else url.searchParams.set('lang', currentLang);
        window.history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
        if (currentProperty) renderProperty(currentProperty);
      });
    });

    fetch(PROJECTS_URL, { cache: 'no-store' })
      .then(response => {
        if (!response.ok) throw new Error(`projects.json HTTP ${response.status}`);
        return response.json();
      })
      .then(projects => {
        const list = Array.isArray(projects) ? projects : [];
        allProjects = list;
        const item = list.find(p => p.slug === requestedSlug);
        if (!requestedSlug || !item) {
          const ui = UI[currentLang] || UI.pl;
          templateApp.className = 'not-found';
          templateApp.innerHTML = `<h1>${esc(ui.not_found)}</h1><p><a class="btn btn-main" href="/pl/new-developments/">${esc(ui.back_link)}</a></p>`;
          return;
        }
        renderProperty(item);
      })
      .catch(error => {
        console.error(error);
        const ui = UI[currentLang] || UI.pl;
        templateApp.className = 'not-found';
        templateApp.innerHTML = `<h1>${esc(ui.error)}</h1><p>/pl/new-developments/projects.json</p><p><a class="btn btn-main" href="/pl/new-developments/">${esc(ui.back_link)}</a></p>`;
      });
  </script>

  
</body>
</html>

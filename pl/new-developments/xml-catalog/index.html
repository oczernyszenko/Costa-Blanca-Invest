<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog nieruchomości</title>

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f5f5}
.container{max-width:1000px;margin:auto}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
img{width:100%;border-radius:12px}
h1{font-size:28px;margin:10px 0}
.price{color:#caa74d;font-weight:bold;font-size:22px}
</style>
</head>

<body>

<div class="container" id="catalog">
Ładowanie...
</div>

<script>
const container = document.getElementById('catalog');
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');

fetch('./properties.json')
.then(res => res.json())
.then(data => {

  if(!Array.isArray(data)){
    container.innerHTML = 'Błąd JSON';
    return;
  }

  const property = data.find(p => p.slug === slug);

  if(!property){
    container.innerHTML = 'Nie znaleziono oferty';
    return;
  }

  container.innerHTML = `
    <div class="card">
      <img src="${property.image}">
      <h1>${property.title}</h1>
      <div class="price">${property.price}</div>
      <p>${property.desc}</p>
    </div>
  `;
})
.catch(err=>{
  container.innerHTML = 'Błąd ładowania JSON';
  console.log(err);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Property</title>
</head>
<body>

<div id="app">Загрузка...</div>

<script>
fetch('./properties.json')
  .then(res => res.json())
  .then(data => {

    const slug = new URLSearchParams(window.location.search).get('slug');

    const property = data.find(p => p.slug === slug);

    if (!property) {
      document.getElementById('app').innerHTML = "❌ Obiekt nie znaleziony";
      return;
    }

    document.getElementById('app').innerHTML = `
      <h1>${property.translations.pl.page_h1}</h1>
      <p><strong>${property.price}</strong></p>

      <img src="${property.images[0]}" style="max-width:400px">

      <p>${property.translations.pl.lead_1}</p>
    `;
  });
</script>

</body>
</html>
